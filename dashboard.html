<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сметы и КС | Дашборд</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; background: #f1f5f9; color: #1e293b; padding: 16px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 16px; }
        .kpi-card { background: white; border-radius: 12px; padding: 16px 18px; border: 1px solid #e2e8f0; }
        .kpi-label { font-size: 14px; color: #64748b; font-weight: 500; }
        .kpi-value { font-size: 28px; font-weight: 700; margin-top: 4px; color: #0f172a; }
        
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .card-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .card-title { font-size: 16px; font-weight: 600; }
        
        .btn { padding: 6px 16px; border-radius: 20px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: #0b8a5e; color: white; }
        .btn-success:hover { background: #0a7a50; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-warning:hover { background: #d97706; }
        .btn-danger { background: #b91c1c; color: white; }
        .btn-danger:hover { background: #991b1b; }
        .btn-outline { background: transparent; border: 1px solid #d1d9e6; }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-sm { padding: 2px 10px; font-size: 12px; }
        .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
        
        .tree { margin-top: 6px; font-size: 15px; }
        .tree-node { margin-left: 0; }
        .node-content { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
        .node-content:hover { background: #f1f5f9; }
        .toggle { font-size: 14px; width: 20px; text-align: center; }
        .name { font-weight: 600; flex: 1; font-size: 15px; }
        .badge { font-size: 13px; padding: 2px 12px; border-radius: 20px; background: #e2e8f0; color: #475569; font-weight: 500; }
        .badge.blue { background: #dbeafe; color: #1d4ed8; }
        .badge.green { background: #d1fae5; color: #0b8a5e; }
        .badge.yellow { background: #fef3c7; color: #d97706; }
        .badge .num { font-size: 15px; font-weight: 700; }
        .children { margin-left: 28px; border-left: 2px solid #e2e8f0; padding-left: 14px; }
        .node-actions { display: flex; gap: 4px; flex-wrap: wrap; }
        .node-actions .btn { padding: 2px 10px; font-size: 12px; }
        
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); justify-content: center; align-items: center; z-index: 999; }
        .modal { background: white; border-radius: 16px; padding: 24px; max-width: 650px; width: 95%; max-height: 90vh; overflow-y: auto; }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .modal label { font-size: 14px; font-weight: 500; display: block; margin-top: 12px; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 10px 14px; border-radius: 20px; border: 1px solid #d1d9e6; margin-top: 4px; font-size: 14px; }
        .modal textarea { border-radius: 12px; min-height: 120px; font-family: monospace; font-size: 13px; }
        .modal-actions { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; flex-wrap: wrap; }
        
        .work-item { display: grid; grid-template-columns: 2.5fr 0.7fr 0.7fr 0.9fr 0.9fr 0.5fr; gap: 6px; padding: 6px 0; border-bottom: 1px solid #e9edf2; font-size: 14px; align-items: center; }
        .work-item.header { font-weight: 600; color: #475569; border-bottom: 2px solid #d1d9e6; font-size: 14px; }
        .work-item input { width: 100%; padding: 5px 8px; border: 1px solid #d1d9e6; border-radius: 10px; font-size: 14px; }
        .work-item input:focus { border-color: #2563eb; outline: none; }
        .work-item .done-input { width: 70px; font-size: 14px; }
        .total-row { font-weight: 600; border-top: 2px solid #2563eb; margin-top: 6px; padding-top: 6px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr; gap: 6px; font-size: 15px; }
        .advance-field { display: flex; gap: 12px; margin-top: 12px; padding: 12px 16px; background: #f8fafc; border-radius: 12px; flex-wrap: wrap; align-items: center; font-size: 14px; }
        .advance-field label { font-weight: 500; font-size: 14px; }
        .advance-field input { width: 160px; padding: 6px 12px; border: 1px solid #d1d9e6; border-radius: 16px; font-size: 14px; }
        
        .cashflow-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 12px; }
        .cf-item { background: #f8fafc; border-radius: 12px; padding: 14px 16px; text-align: center; cursor: pointer; }
        .cf-item:hover { background: #e9edf2; }
        .cf-month { font-size: 14px; color: #64748b; font-weight: 500; }
        .cf-value { font-weight: 700; font-size: 22px; margin-top: 4px; color: #0b8a5e; }
        .cf-detail { font-size: 13px; color: #94a3b8; margin-top: 3px; }
        
        .payment-detail-item { display: grid; grid-template-columns: 1.5fr 0.8fr 0.8fr 0.8fr 0.8fr 0.8fr 0.4fr 0.3fr; gap: 6px; padding: 8px 6px; border-bottom: 1px solid #e9edf2; font-size: 14px; align-items: center; }
        .payment-detail-item.header { font-weight: 600; color: #475569; border-bottom: 2px solid #d1d9e6; background: #f8fafc; font-size: 14px; }
        
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .chart-container { max-height: 200px; overflow-y: auto; }
        .chart-item { margin-bottom: 8px; }
        .chart-item .label { display: flex; justify-content: space-between; font-size: 14px; font-weight: 500; }
        .chart-item .bar { height: 8px; background: #e9edf2; border-radius: 6px; overflow: hidden; margin-top: 2px; }
        .chart-item .bar .fill { height: 100%; border-radius: 6px; }
        .progress-mini { height: 6px; background: #e9edf2; border-radius: 4px; overflow: hidden; width: 70px; }
        .progress-mini .fill { height: 100%; border-radius: 4px; }
        
        .payment-tree .tree-node .node-content .name { font-size: 15px; }
        .payment-tree .tree-node .node-content .badge { font-size: 13px; }
        .payment-tree .tree-node .node-content .badge .num { font-size: 15px; }
        
        @media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } .analytics-grid { grid-template-columns: 1fr; } .cashflow-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .kpi-grid { grid-template-columns: 1fr 1fr; } .cashflow-grid { grid-template-columns: 1fr; } .work-item { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- KPI -->
    <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">Объектов</div><div class="kpi-value" id="kpiObjects">0</div></div>
        <div class="kpi-card"><div class="kpi-label">Смет</div><div class="kpi-value" id="kpiEstimates">0</div></div>
        <div class="kpi-card"><div class="kpi-label">Бюджет</div><div class="kpi-value" id="kpiBudget">0 ₽</div></div>
        <div class="kpi-card"><div class="kpi-label">Выполнено</div><div class="kpi-value" id="kpiDone">0 ₽</div></div>
        <div class="kpi-card"><div class="kpi-label">Прогресс</div><div class="kpi-value" id="kpiProgress">0%</div></div>
    </div>

    <!-- Аналитика -->
    <div class="card">
        <div class="card-header"><span class="card-title">📊 Аналитика</span></div>
        <div class="analytics-grid">
            <div><h4 style="font-size:15px;font-weight:500;margin-bottom:6px;">Динамика по сметам</h4><div class="chart-container" id="estimatesChart"></div></div>
            <div><h4 style="font-size:15px;font-weight:500;margin-bottom:6px;">% выполнения</h4><div class="chart-container" id="progressChart"></div></div>
        </div>
    </div>

    <!-- Дерево объектов -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">📁 Объекты → Сметы → КС</span>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="openModal('object')">+ Объект</button>
                <button class="btn btn-success" onclick="openImportModal('object')">📥</button>
            </div>
        </div>
        <div class="tree" id="treeContainer"></div>
    </div>

    <!-- Поступления -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">💰 Поступления</span>
            <button class="btn btn-primary" onclick="openPaymentModal()">+ Добавить</button>
        </div>
        <div class="cashflow-grid" id="cashflowGrid"></div>
    </div>

    <!-- Поступления по сметам (дерево) -->
    <div class="card">
        <div class="card-header"><span class="card-title">📊 Поступления по сметам</span></div>
        <div class="payment-tree" id="paymentTreeContainer"></div>
    </div>
</div>

<!-- Модалки -->
<div class="modal-overlay" id="modalOverlay"><div class="modal">
    <div class="modal-title" id="modalTitle">Добавить</div>
    <label>Название</label><input id="modalInput">
    <div id="modalExtra"></div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Отмена</button><button class="btn btn-primary" onclick="modalSave()">Сохранить</button></div>
</div></div>

<div class="modal-overlay" id="importModal"><div class="modal">
    <div class="modal-title" id="importModalTitle">📥 Импорт</div>
    <label>Данные (название, ед, кол-во, цена — через TAB)</label>
    <textarea id="importData" placeholder="Демонтаж стен&#10;м2&#9;45&#9;1200"></textarea>
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeImportModal()">Отмена</button><button class="btn btn-success" onclick="importFromGoogle()">Импорт</button></div>
</div></div>

<div class="modal-overlay" id="worksModal"><div class="modal" style="max-width:900px;">
    <div class="modal-title" id="worksModalTitle">📄 Смета</div>
    <div id="worksList"></div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeWorksModal()">Закрыть</button></div>
</div></div>

<div class="modal-overlay" id="ksModal"><div class="modal" style="max-width:900px;">
    <div class="modal-title" id="ksModalTitle">✏️ КС</div>
    <div id="ksWorksList"></div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeKsModal()">Закрыть</button></div>
</div></div>

<div class="modal-overlay" id="paymentModal"><div class="modal">
    <div class="modal-title" id="paymentModalTitle">💰 Поступление</div>
    <label>Смета</label><select id="paymentEstimate"></select>
    <label>Тип</label><select id="paymentType"><option value="payment">Поступление</option><option value="advance">Аванс</option></select>
    <label>Сумма</label><input type="number" id="paymentAmount">
    <label>Дата</label><input type="date" id="paymentDate">
    <input type="hidden" id="paymentEditId">
    <div class="modal-actions"><button class="btn btn-outline" onclick="closePaymentModal()">Отмена</button><button class="btn btn-danger" id="paymentDeleteBtn" style="display:none;" onclick="deletePaymentFromModal()">Удалить</button><button class="btn btn-primary" onclick="savePayment()">Сохранить</button></div>
</div></div>

<div class="modal-overlay" id="paymentDetailModal"><div class="modal" style="max-width:1000px;">
    <div class="modal-title" id="paymentDetailTitle">📋 Детали</div>
    <div id="paymentDetailList"></div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="closePaymentDetailModal()">Закрыть</button></div>
</div></div>

<script>
// ============================================================
// 1. ДАННЫЕ — СОХРАНЯЮТСЯ В localStorage
// ============================================================
function loadData() {
    try {
        const saved = localStorage.getItem('dashData');
        if (saved) {
            return JSON.parse(saved);
        }
    } catch(e) {}
    return null;
}

function saveData() {
    try {
        localStorage.setItem('dashData', JSON.stringify(data));
    } catch(e) {
        console.warn('Не удалось сохранить данные:', e);
    }
}

// Загружаем данные или создаём начальные
let savedData = loadData();

if (savedData) {
    var data = savedData;
} else {
    var data = {
        objects: [
            {
                id: 1,
                name: 'Сущевский вал',
                estimates: [
                    {
                        id: 101,
                        name: 'Демонтаж внутренних перегородок и штукатурки',
                        budget: 1310104.8,
                        done: 0,
                        status: 'active',
                        works: [],
                        ksList: []
                    },
                    {
                        id: 102,
                        name: 'Главная лестница',
                        budget: 88000,
                        done: 0,
                        status: 'active',
                        works: [],
                        ksList: []
                    },
                    {
                        id: 103,
                        name: 'Снос не жилого здания',
                        budget: 1409674.22,
                        done: 0,
                        status: 'active',
                        works: [],
                        ksList: []
                    },
                    {
                        id: 104,
                        name: 'Внутренние строительно-монтажные и отделочные работы. Смета №25/06',
                        budget: 4941139.92,
                        done: 0,
                        status: 'active',
                        works: [],
                        ksList: []
                    }
                ]
            },
            {
                id: 2,
                name: 'Начатки',
                estimates: []
            }
        ],
        payments: []
    };
    saveData();
}

// Счётчики для ID
let nextObjectId = 3;
let nextEstimateId = 105;
let nextKsId = 1001;
let nextPaymentId = 1;

// Функция генерации уникального ID
function generateId(type) {
    let max = 0;
    if (type === 'object') {
        data.objects.forEach(o => { if (o.id > max) max = o.id; });
        return max + 1;
    } else if (type === 'estimate') {
        data.objects.forEach(o => {
            o.estimates.forEach(e => { if (e.id > max) max = e.id; });
        });
        return max + 1;
    } else if (type === 'ks') {
        data.objects.forEach(o => {
            o.estimates.forEach(e => {
                if (e.ksList) {
                    e.ksList.forEach(k => { if (k.id > max) max = k.id; });
                }
            });
        });
        return max + 1;
    } else if (type === 'payment') {
        data.payments.forEach(p => { if (p.id > max) max = p.id; });
        return max + 1;
    }
}

// ============================================================
// 2. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
// ============================================================
function fmt(v) { return (v || 0).toLocaleString('ru-RU') + ' ₽'; }
function pct(v) { return (v || 0).toFixed(0) + '%'; }

function getEstimate(id) {
    for (const obj of data.objects) {
        for (const est of obj.estimates) {
            if (est.id === id) return est;
        }
    }
    return null;
}

function getKs(id) {
    for (const obj of data.objects) {
        for (const est of obj.estimates) {
            if (est.ksList) {
                for (const ks of est.ksList) {
                    if (ks.id === id) return ks;
                }
            }
        }
    }
    return null;
}

function getObject(id) {
    return data.objects.find(o => o.id === id);
}

// ============================================================
// 3. ПЕРЕСЧЁТ ВСЕХ ДАННЫХ
// ============================================================
function recalcAll() {
    data.objects.forEach(obj => {
        obj.estimates.forEach(est => {
            // Пересчёт бюджета из работ
            est.budget = (est.works || []).reduce((s, w) => s + (w.qty || 0) * (w.price || 0), 0);
            
            // Пересчёт выполнения из КС
            let done = 0;
            if (est.ksList) {
                est.ksList.forEach(ks => {
                    if (ks.works) {
                        ks.budget = ks.works.reduce((s, w) => s + (w.qty || 0) * (w.price || 0), 0);
                        ks.done = ks.works.reduce((s, w) => s + (w.done || 0) * (w.price || 0), 0);
                        ks.status = ks.done >= ks.budget ? 'completed' : 'active';
                        done += ks.done;
                    }
                });
            }
            est.done = done;
            est.status = done >= est.budget ? 'completed' : 'active';
        });
    });
    saveData();
}

// ============================================================
// 4. РЕНДЕРИНГ
// ============================================================
function render() {
    recalcAll();
    
    // Дерево объектов
    let html = '';
    data.objects.forEach(obj => {
        html += `<div class="tree-node"><div class="node-content" onclick="toggle(this)"><span class="toggle">▼</span><span class="name">📁 ${obj.name}</span><span class="badge blue">${obj.estimates.length}</span>
        <span class="node-actions">
            <button class="btn btn-sm btn-warning" onclick="event.stopPropagation();openModal('estimate',${obj.id})">+С</button>
            <button class="btn btn-sm btn-success" onclick="event.stopPropagation();openImportModal('estimate',${obj.id})">📥</button>
            <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();openModal('object',null,${obj.id})">✎</button>
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();delObj(${obj.id})">✕</button>
        </span></div><div class="children">`;
        
        obj.estimates.forEach(est => {
            let pr = est.budget > 0 ? (est.done / est.budget * 100) : 0;
            let cl = est.status === 'completed' ? 'green' : 'yellow';
            html += `<div class="tree-node"><div class="node-content" onclick="toggle(this)"><span class="toggle">▼</span><span class="name">📄 ${est.name}</span>
            <span class="badge ${cl}">${est.status === 'completed' ? '✅' : '🔄'} <span class="num">${pct(pr)}</span></span>
            <span class="badge"><span class="num">${fmt(est.done)}</span> / <span class="num">${fmt(est.budget)}</span></span>
            <span class="node-actions">
                <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();openWorks(${est.id})">📋</button>
                <button class="btn btn-sm btn-warning" onclick="event.stopPropagation();addKs(${est.id})">+КС</button>
                <button class="btn btn-sm btn-success" onclick="event.stopPropagation();openImportModal('ks',${est.id})">📥</button>
                <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();openModal('estimate',${obj.id},${est.id})">✎</button>
                <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();delEst(${obj.id},${est.id})">✕</button>
            </span></div><div class="children">`;
            
            if (est.ksList && est.ksList.length > 0) {
                est.ksList.forEach(ks => {
                    let kpr = ks.budget > 0 ? (ks.done / ks.budget * 100) : 0;
                    let kcl = ks.status === 'completed' ? 'green' : 'yellow';
                    html += `<div class="tree-node"><div class="node-content">
                        <span class="toggle">•</span>
                        <span class="name">📋 ${ks.name}</span>
                        <span class="badge ${kcl}">${ks.status === 'completed' ? '✅' : '🔄'} <span class="num">${pct(kpr)}</span></span>
                        <span class="badge"><span class="num">${fmt(ks.done)}</span> / <span class="num">${fmt(ks.budget)}</span></span>
                        <span class="node-actions">
                            <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();openKs(${ks.id})">✎</button>
                            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();delKs(${est.id},${ks.id})">✕</button>
                        </span>
                    </div></div>`;
                });
            }
            html += `</div></div>`;
        });
        html += `</div></div>`;
    });
    document.getElementById('treeContainer').innerHTML = html;
    
    updateKPI();
    renderAnalytics();
    renderPayments();
    renderPaymentTree();
}

function toggle(el) {
    let c = el.parentElement.querySelector('.children');
    let t = el.querySelector('.toggle');
    if (c) {
        if (c.style.display === 'none') { c.style.display = 'block'; t.textContent = '▼'; }
        else { c.style.display = 'none'; t.textContent = '▶'; }
    }
}

// ============================================================
// 5. KPI И АНАЛИТИКА
// ============================================================
function updateKPI() {
    let objs = data.objects.length, ests = 0, bud = 0, done = 0;
    data.objects.forEach(o => {
        ests += o.estimates.length;
        o.estimates.forEach(e => { bud += e.budget; done += e.done; });
    });
    document.getElementById('kpiObjects').textContent = objs;
    document.getElementById('kpiEstimates').textContent = ests;
    document.getElementById('kpiBudget').textContent = fmt(bud);
    document.getElementById('kpiDone').textContent = fmt(done);
    document.getElementById('kpiProgress').textContent = bud > 0 ? pct(done / bud * 100) : '0%';
}

function renderAnalytics() {
    let items = [];
    data.objects.forEach(o => {
        o.estimates.forEach(e => {
            items.push({ n: o.name + ' → ' + e.name, b: e.budget, d: e.done });
        });
    });
    
    let c1 = document.getElementById('estimatesChart'), c2 = document.getElementById('progressChart');
    if (!items.length) {
        c1.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:10px;font-size:14px;">Нет данных</div>';
        c2.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:10px;font-size:14px;">Нет данных</div>';
        return;
    }
    
    let max = Math.max(...items.map(i => i.b), 1);
    c1.innerHTML = items.map(i => `<div class="chart-item"><div class="label"><span>${i.n}</span><span>${fmt(i.d)} / ${fmt(i.b)}</span></div><div class="bar"><div class="fill" style="width:${Math.min(100, i.b/max*100)}%;background:#e9edf2;"></div></div><div class="bar"><div class="fill" style="width:${Math.min(100, i.d/max*100)}%;background:#2563eb;margin-top:-4px;"></div></div></div>`).join('');
    
    c2.innerHTML = items.map(i => {
        let p = i.b > 0 ? (i.d / i.b * 100) : 0;
        let c = p >= 100 ? '#0b8a5e' : p >= 50 ? '#f59e0b' : '#2563eb';

let impCtx = { type: '', target: null };

function openImportModal(type, target) {
    impCtx = { type, target };
    let ov = document.getElementById('importModal');
    let ti = document.getElementById('importModalTitle');
    let e = type === 'estimate' ? getEstimate(target) : null;
    ti.textContent = type === 'object' ? '📥 Импорт объекта' :
                     type === 'estimate' ? `📥 Импорт в "${e ? e.name : ''}"` :
                     `📥 Импорт в КС`;
    document.getElementById('importData').value = '';
    ov.style.display = 'flex';
}

function closeImportModal() {
    document.getElementById('importModal').style.display = 'none';
}

function importFromGoogle() {
    let raw = document.getElementById('importData').value;
    if (!raw.trim()) return alert('Вставьте данные');
    
    let lines = raw.split('\n').filter(l => l.trim());
    let works = [];
    for (let line of lines) {
        let p = line.split('\t').map(s => s.trim()).filter(s => s);
        if (p.length < 3) p = line.split(/\s{2,}/).map(s => s.trim()).filter(s => s);
        if (p.length >= 3) {
            let name = p[0], unit = p[1] || '';
            let qty = parseFloat(p[2].replace(/,/g, '.')) || 0;
            let price = p.length >= 4 ? parseFloat(p[3].replace(/,/g, '.')) || 0 : 0;
            if (name.includes('%')) continue;
            if (qty > 0 && price > 0) works.push({ name, unit, qty, price });
        }
    }
    if (!works.length) return alert('Не удалось распознать данные');
    
    let type = impCtx.type, target = impCtx.target;
    if (type === 'object') {
        let name = prompt('Название объекта:', 'Новый объект') || 'Новый объект';
        let o = { id: generateId('object'), name, estimates: [] };
        let e = {
            id: generateId('estimate'),
            name: name + ' (смета)',
            budget: works.reduce((s, w) => s + w.qty * w.price, 0),
            done: 0,
            status: 'active',
            works: works,
            ksList: []
        };
        o.estimates.push(e);
        data.objects.push(o);
    } else if (type === 'estimate') {
        let e = getEstimate(target);
        if (!e) return alert('Смета не найдена');
        e.works = works;
        e.budget = works.reduce((s, w) => s + w.qty * w.price, 0);
    } else if (type === 'ks') {
        let e = getEstimate(target);
        if (!e) return alert('Смета не найдена');
        let bud = works.reduce((s, w) => s + w.qty * w.price, 0);
        let newId = generateId('ks');
        if (!e.ksList) e.ksList = [];
        e.ksList.push({
            id: newId,
            name: 'КС-2-' + String(newId).padStart(2, '0') + ' (импорт)',
            ksNumber: 'КС-2-' + String(newId).padStart(2, '0'),
            advance: 0,
            budget: bud,
            done: 0,
            status: 'active',
            works: works.map(w => ({ ...w, done: 0 }))
        });
    }
    closeImportModal();
    saveData();
    render();
    alert('✅ Импортировано ' + works.length + ' позиций');
}

        h += `<div class="work-item">
            <span style="font-weight:500;">${w.name || ''}</span>
            <span>${w.unit || ''}</span>
            <span>${w.qty || 0}</span>

            <span id="kc-${id}-${i}" style="font-weight:600;font-size:15px;">${fmt(cst)}</span>
            <button class="btn btn-danger btn-sm" onclick="delKsW(${id},${i})">✕</button>

// 10. ДОБАВЛЕНИЕ КС (НА ОСТАТОК)
// ============================================================
function addKs(estId) {
    let est = getEstimate(estId);
    if (!est) return;
    if (!est.ksList) est.ksList = [];
    if (!est.works) est.works = [];
    
    // Считаем выполнение по каждой позиции
    let doneMap = {};
    est.ksList.forEach(ks => {
        if (ks.works) {
            ks.works.forEach(w => {
                if (!doneMap[w.name]) doneMap[w.name] = 0;
                doneMap[w.name] += w.done || 0;
            });
        }
    });
    
    // Остаток работ
    let remainWorks = est.works.map(w => {
        let done = doneMap[w.name] || 0;
        let remain = Math.max(0, (w.qty || 0) - done);
        return { ...w, qty: remain, done: 0 };
    }).filter(w => w.qty > 0 && w.price > 0);
    
    if (remainWorks.length === 0) {
        alert('✅ Все работы по этой смете уже выполнены!');
        return;
    }
    
    let remainBudget = remainWorks.reduce((s, w) => s + w.qty * w.price, 0);
    let newId = generateId('ks');
    
    est.ksList.push({
        id: newId,
        name: 'КС-2-' + String(newId).padStart(2, '0') + ' (остаток)',
        ksNumber: 'КС-2-' + String(newId).padStart(2, '0'),
        advance: 0,
        budget: remainBudget,
        done: 0,
        status: 'active',
        works: remainWorks.map(w => ({ ...w, done: 0 }))
    });
    
    saveData();
    render();
    alert('✅ Создана новая КС на остаток: ' + fmt(remainBudget));
}

function savePayment() {
    let eid = parseInt(document.getElementById('paymentEstimate').value);
    let amt = parseFloat(document.getElementById('paymentAmount').value);
    let dt = document.getElementById('paymentDate').value;
    let tp = document.getElementById('paymentType').value;
    let editId = document.getElementById('paymentEditId').value;
    
    if (!amt || amt <= 0) return alert('Введите сумму');
    if (!dt) return alert('Выберите дату');
    
    if (editId) {
        let idx = data.payments.findIndex(p => p.id === parseInt(editId));
        if (idx > -1) data.payments[idx] = { ...data.payments[idx], estimateId: eid, amount: amt, date: dt, type: tp };
    } else {
        data.payments.push({ id: generateId('payment'), estimateId: eid, amount: amt, date: dt, type: tp });
    }
    closePaymentModal();
    saveData();
    render();
}

function deletePaymentFromModal() {
    let id = document.getElementById('paymentEditId').value;
    if (!id) return;
    if (!confirm('Удалить поступление?')) return;
    data.payments = data.payments.filter(p => p.id !== parseInt(id));
    closePaymentModal();
    saveData();

    saveData();
    render();
}

function renderPayments() {
    let grid = document.getElementById('cashflowGrid');
    let months = {};
    data.payments.forEach(p => {
        if (!p.date) return;
        let m = p.date.substring(0, 7);
        if (!months[m]) months[m] = { total: 0, items: [] };
        months[m].total += p.amount;
        months[m].items.push(p);
    });
    let keys = Object.keys(months).sort();
    let last = keys.slice(-6);
    let html = '';
    if (!last.length) {
        html = '<div style="grid-column:1/-1;text-align:center;color:#94a3b8;padding:10px;font-size:14px;">Нет поступлений</div>';
    } else {
        last.forEach(m => {
            let [y, mo] = m.split('-');
            let mn = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'][parseInt(mo)-1];
            let d = months[m];
            html += `<div class="cf-item" onclick="openPaymentDetail('${m}')">
                <div class="cf-month">${mn} ${y}</div>
                <div class="cf-value">${fmt(d.total)}</div>
                <div class="cf-detail">${d.items.length} поступл.</div>
            </div>`;
        });
    }
    grid.innerHTML = html;
}

function openPaymentDetail(m) {
    let mp = data.payments.filter(p => p.date && p.date.startsWith(m));
    if (!mp.length) { alert('Нет поступлений за этот месяц'); return; }
    
    document.getElementById('paymentDetailTitle').textContent = '📋 Детали за ' + m;

            <span style="font-weight:600;font-size:15px;">${fmt(d.payment)}</span>

            <span style="font-weight:600;font-size:15px;">${fmt(d.totalPaid)}</span>
            <span style="font-weight:600;font-size:15px;">${fmt(d.remain)}</span>
            <span style="font-weight:700;font-size:16px;color:${c};">${pct(d.paidPercent)}</span>
            <span>
                ${d.payments.map(p => `
                    <button class="btn btn-sm btn-outline" onclick="openPaymentModal(${p.id})">✎</button>
                    <button class="btn btn-sm btn-danger" onclick="deletePayment(${p.id});render();">✕</button>
                `).join('')}
            </span>
        </div>`;
    });
    
    let tb = Object.values(detailData).reduce((s, d) => s + d.budget, 0);
    let tp = Object.values(detailData).reduce((s, d) => s + d.payment, 0);
    let ta = Object.values(detailData).reduce((s, d) => s + d.advance, 0);
    let ttot = Object.values(detailData).reduce((s, d) => s + d.totalPaid, 0);
    let trem = Object.values(detailData).reduce((s, d) => s + d.remain, 0);
    let tpct = tb > 0 ? (ttot / tb * 100) : 0;
    h += `<div class="payment-detail-item" style="font-weight:700;border-top:2px solid #2563eb;background:#f8fafc;border-radius:6px;margin-top:6px;padding-top:6px;font-size:15px;">
        <span>ИТОГО</span><span>${fmt(tb)}</span><span>${fmt(tp)}</span><span>${fmt(ta)}</span><span>${fmt(ttot)}</span><span>${fmt(trem)}</span>
        <span style="color:${tpct >= 100 ? '#0b8a5e' : tpct >= 50 ? '#f59e0b' : '#2563eb'};font-size:17px;">${pct(tpct)}</span>
        <span></span>
    </div>`;
    document.getElementById('paymentDetailList').innerHTML = h;
    document.getElementById('paymentDetailModal').style.display = 'flex';
}

function closePaymentDetailModal() {
    document.getElementById('paymentDetailModal').style.display = 'none';
}

// ============================================================
// 13. ДЕРЕВО ПОСТУПЛЕНИЙ
// ============================================================
function renderPaymentTree() {
    let c = document.getElementById('paymentTreeContainer');
    let h = '';
    data.objects.forEach(o => {
        h += `<div class="tree-node"><div class="node-content" onclick="toggleP(this)"><span class="toggle">▼</span><span class="name">📁 ${o.name}</span><span class="badge blue">${o.estimates.length}</span></div><div class="children">`;
        o.estimates.forEach(e => {
            let p = data.payments.filter(x => x.estimateId === e.id);
            let total = p.reduce((s, x) => s + x.amount, 0);
            let pr = e.budget > 0 ? (total / e.budget * 100) : 0;
            let cl = pr >= 100 ? 'green' : pr >= 50 ? 'yellow' : 'blue';
            h += `<div class="tree-node"><div class="node-content" onclick="toggleP(this)"><span class="toggle">▼</span><span class="name">📄 ${e.name}</span><span class="badge ${cl}"><span class="num">${fmt(total)}</span> / <span class="num">${fmt(e.budget)}</span> (<span class="num">${pct(pr)}</span>)</span><span class="badge">${p.length}</span></div><div class="children">`;
            if (!p.length) {
                h += `<div class="tree-node"><div class="node-content"><span class="toggle">•</span><span class="name" style="color:#94a3b8;font-size:14px;">Нет поступлений</span></div></div>`;
            } else {
                p.sort((a, b) => a.date.localeCompare(b.date)).forEach(pp => {
                    let lbl = pp.type === 'advance' ? '💰 Аванс' : '💳 Поступление';
                    h += `<div class="tree-node"><div class="node-content">
                        <span class="toggle">•</span>
                        <span class="name">${pp.date} — ${lbl}</span>
                        <span class="badge green" style="font-size:14px;font-weight:600;">${fmt(pp.amount)}</span>
                        <span class="node-actions">
                            <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();openPaymentModal(${pp.id})">✎</button>
                            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deletePayment(${pp.id})">✕</button>
                        </span>
                    </div></div>`;
                });
            }
            h += `</div></div>`;
        });
        h += `</div></div>`;
    });
    c.innerHTML = h;
}

function toggleP(el) {
    let c = el.parentElement.querySelector('.children');
    let t = el.querySelector('.toggle');
    if (c) {
        if (c.style.display === 'none') { c.style.display = 'block'; t.textContent = '▼'; }
        else { c.style.display = 'none'; t.textContent = '▶'; }
    }
}
